name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: bun-darwin-arm64
            asset: vc-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            asset: vc-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: vc-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: vc-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Compile
        run: |
          mkdir -p dist
          bun build src/cli.ts --compile --minify --sourcemap \
            --target=${{ matrix.target }} \
            --outfile dist/${{ matrix.asset }}

      - name: Smoke test compiled binary
        env:
          VIBECHECK_BINARY: ${{ github.workspace }}/dist/${{ matrix.asset }}
        run: bun run test:binary

      - name: Checksum
        run: shasum -a 256 dist/${{ matrix.asset }} > dist/${{ matrix.asset }}.sha256

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" \
                 --repo "${GITHUB_REPOSITORY}" \
                 --title "${GITHUB_REF_NAME}" \
                 --generate-notes
          gh release upload "${GITHUB_REF_NAME}" \
            dist/${{ matrix.asset }} \
            dist/${{ matrix.asset }}.sha256 \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
